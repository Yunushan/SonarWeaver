---
- name: Assert a supported automation environment
  ansible.builtin.assert:
    that:
      - ansible_system == 'Linux'
      - ansible_service_mgr == 'systemd'
      - sonarweaver_java_major | int in [21, 25]
    fail_msg: >-
      The Ansible path supports Linux hosts with systemd and Java 21 or 25.

- name: Select the configured Java package
  ansible.builtin.set_fact:
    _sonarweaver_java_package: >-
      {{ sonarweaver_java_package | default(
           sonarweaver_java_packages_by_os_family[ansible_os_family] | default(''), true) }}
  when: sonarweaver_manage_java | bool

- name: Require a Java package mapping when Java management is enabled
  ansible.builtin.assert:
    that:
      - _sonarweaver_java_package | length > 0
    fail_msg: >-
      Set sonarweaver_java_package for this Linux family, or install a current
      Java 21 or 25 distribution outside this role.
  when: sonarweaver_manage_java | bool

- name: Install the selected Java runtime
  ansible.builtin.package:
    name: "{{ _sonarweaver_java_package }}"
    state: present
  when: sonarweaver_manage_java | bool

- name: Read the installed Java version
  ansible.builtin.command:
    argv:
      - java
      - -version
  changed_when: false
  register: _sonarweaver_java_version

- name: Assert a supported installed Java version
  ansible.builtin.assert:
    that:
      - _sonarweaver_java_version.rc == 0
      - >-
        (_sonarweaver_java_version.stdout ~ _sonarweaver_java_version.stderr)
        is search('version "(21|25)([."]|$)')
    fail_msg: SonarWeaver requires a current Java 21 or Java 25 runtime.

- name: Create the dedicated service group
  ansible.builtin.group:
    name: "{{ sonarweaver_service_group }}"
    system: true

- name: Create the dedicated non-login service user
  ansible.builtin.user:
    name: "{{ sonarweaver_service_user }}"
    group: "{{ sonarweaver_service_group }}"
    home: "{{ sonarweaver_install_root }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Create SonarWeaver persistent directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ sonarweaver_install_root }}"
      owner: root
      group: root
      mode: '0755'
    - path: "{{ sonarweaver_install_root }}/versions"
      owner: root
      group: root
      mode: '0755'
    - path: "{{ sonarweaver_data_dir }}"
      owner: "{{ sonarweaver_service_user }}"
      group: "{{ sonarweaver_service_group }}"
      mode: '0750'
    - path: "{{ sonarweaver_logs_dir }}"
      owner: "{{ sonarweaver_service_user }}"
      group: "{{ sonarweaver_service_group }}"
      mode: '0750'
    - path: "{{ sonarweaver_temp_dir }}"
      owner: "{{ sonarweaver_service_user }}"
      group: "{{ sonarweaver_service_group }}"
      mode: '0750'
    - path: "{{ sonarweaver_config_dir }}"
      owner: root
      group: "{{ sonarweaver_service_group }}"
      mode: '0750'

- name: Persist Elasticsearch kernel limits
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-sonarweaver.conf
    reload: true
  loop:
    - name: vm.max_map_count
      value: "{{ sonarweaver_required_vm_max_map_count }}"
    - name: fs.file-max
      value: "{{ sonarweaver_required_fs_file_max }}"

- name: Persist service-user process limits
  community.general.pam_limits:
    domain: "{{ sonarweaver_service_user }}"
    limit_type: '-'
    limit_item: "{{ item.name }}"
    value: "{{ item.value }}"
    dest: /etc/security/limits.d/99-sonarweaver.conf
  loop:
    - name: nofile
      value: "{{ sonarweaver_required_nofile }}"
    - name: nproc
      value: "{{ sonarweaver_required_nproc }}"
