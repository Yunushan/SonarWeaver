---
- name: Assert TLS proxy inputs
  ansible.builtin.assert:
    that:
      - sonarweaver_proxy_server_name | length > 0
      - sonarweaver_proxy_tls_certificate | length > 0
      - sonarweaver_proxy_tls_certificate_key | length > 0
    fail_msg: >-
      Set the server name and existing certificate/key paths before enabling the
      optional NGINX TLS proxy role.
  when: sonarweaver_proxy_enabled | bool

- name: Install NGINX when the optional proxy is enabled
  ansible.builtin.package:
    name: nginx
    state: present
  when: sonarweaver_proxy_enabled | bool

- name: Inspect TLS certificate and key files
  ansible.builtin.stat:
    path: "{{ item }}"
    follow: true
  loop:
    - "{{ sonarweaver_proxy_tls_certificate }}"
    - "{{ sonarweaver_proxy_tls_certificate_key }}"
  register: _sonarweaver_proxy_tls_files
  no_log: true
  when: sonarweaver_proxy_enabled | bool

- name: Assert TLS certificate and key files are readable regular files
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isreg
      - item.stat.readable
    fail_msg: >-
      The configured SonarWeaver TLS certificate and key must exist as readable
      regular files on the managed host.
  loop: "{{ _sonarweaver_proxy_tls_files.results }}"
  no_log: true
  when: sonarweaver_proxy_enabled | bool

- name: Render the SonarQube NGINX TLS virtual host
  ansible.builtin.template:
    src: sonarweaver.conf.j2
    dest: /etc/nginx/conf.d/sonarweaver.conf
    owner: root
    group: root
    mode: '0644'
  when: sonarweaver_proxy_enabled | bool
  notify: Reload nginx

- name: Validate the NGINX configuration before activation
  ansible.builtin.command:
    argv:
      - nginx
      - -t
  changed_when: false
  when: sonarweaver_proxy_enabled | bool

- name: Enable and start NGINX when the optional proxy is enabled
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
  when: sonarweaver_proxy_enabled | bool

- name: Activate a changed NGINX configuration before service verification
  ansible.builtin.meta: flush_handlers
  when: sonarweaver_proxy_enabled | bool
