---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-and-yaml:
    name: Shell and YAML
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Install validators
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck yamllint

      - name: Verify executable scripts and run smoke tests
        shell: bash
        run: |
          mapfile -d '' executables < <(
            find deployments tests -type f -name '*.sh' -print0
          )
          executables+=(bin/sonarweaver)
          for file in "${executables[@]}"; do
            if [[ ! -x ${file} ]]; then
              echo "Expected executable bit on ${file}" >&2
              exit 1
            fi
          done
          ./tests/smoke.sh

      - name: Run ShellCheck
        shell: bash
        run: |
          mapfile -d '' scripts < <(find . -type f -name '*.sh' -not -path './.git/*' -print0)
          scripts+=(bin/sonarweaver)
          if (( ${#scripts[@]} == 0 )); then
            echo 'No shell scripts found.'
            exit 0
          fi
          shellcheck "${scripts[@]}"

      - name: Lint YAML
        run: yamllint .

      - name: Verify CI security invariants
        run: python3 tests/ci-policy.py

  ansible:
    name: Ansible static checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Ansible validators
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Lint Ansible content
        run: ansible-lint ansible

      - name: Check Ansible playbook syntax
        run: ansible-playbook --syntax-check -i ansible/inventory/production.example.yml ansible/playbooks/site.yml

      - name: Check Molecule scenario syntax
        working-directory: ansible
        run: molecule syntax

  powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Install PSScriptAnalyzer
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force

      - name: Validate PowerShell syntax
        shell: powershell
        run: |
          $files = Get-ChildItem -Path . -Recurse -File -Include *.ps1, *.psd1, *.psm1
          if (-not $files) {
              Write-Host 'No PowerShell files found.'
              exit 0
          }

          $failed = $false
          foreach ($file in $files) {
              $tokens = $null
              $parseErrors = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile(
                  $file.FullName,
                  [ref]$tokens,
                  [ref]$parseErrors
              )
              foreach ($parseError in $parseErrors) {
                  Write-Error "$($file.FullName):$($parseError.Extent.StartLineNumber): $($parseError.Message)"
                  $failed = $true
              }
          }
          if ($failed) { exit 1 }

      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          $files = Get-ChildItem -Path . -Recurse -File -Include *.ps1, *.psd1, *.psm1
          if (-not $files) {
              Write-Host 'No PowerShell files found.'
              exit 0
          }

          $findings = foreach ($file in $files) {
              Invoke-ScriptAnalyzer -Path $file.FullName -Severity Error, Warning
          }
          $findings | Format-Table -AutoSize
          if ($findings) { exit 1 }

      - name: Verify Windows installer security invariants
        shell: powershell
        run: .\tests\windows-installer-policy.ps1

      - name: Run Windows production verifier contracts
        shell: powershell
        run: .\tests\verify-production.ps1

  docker-compose:
    name: Docker Compose
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Validate Compose files
        shell: bash
        run: |
          base='deployments/docker/compose.yaml'
          env_file='deployments/docker/.env.example'
          if [[ ! -f ${base} || ! -f ${env_file} ]]; then
            echo 'The base Compose file or its example environment file is missing.' >&2
            exit 1
          fi
          for private_file in deployments/docker/.env deployments/docker/secrets/jdbc_password; do
            if [[ -e ${private_file} ]]; then
              echo "Private runtime file must not be committed: ${private_file}" >&2
              exit 1
            fi
          done

          docker compose --env-file "${env_file}" --file "${base}" config --quiet

          mapfile -d '' overlays < <(
            find deployments/docker -maxdepth 1 -type f \
              \( -name 'compose.*.yaml' -o -name 'compose.*.yml' \) -print0
          )
          for overlay in "${overlays[@]}"; do
            echo "Validating ${base} with ${overlay}"
            docker compose --env-file "${env_file}" \
              --file "${base}" --file "${overlay}" config --quiet
          done

  docker-integration:
    name: Docker Compose integration
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Start the pinned evaluation stack
        working-directory: deployments/docker
        shell: bash
        run: |
          ./bootstrap.sh evaluation --apply-sysctl

      - name: Wait for SonarQube API health
        shell: bash
        run: |
          for attempt in {1..90}; do
            if curl --fail --silent --show-error http://127.0.0.1:9000/api/system/status | grep -q '"status":"UP"'; then
              exit 0
            fi
            sleep 5
          done
          echo 'SonarQube did not report UP within 450 seconds.' >&2
          exit 1

      - name: Verify a PostgreSQL backup restores successfully
        working-directory: deployments/docker
        shell: bash
        run: |
          set -o pipefail
          docker compose --env-file .env -f compose.yaml -f compose.local.yaml \
            exec -T db createdb -U sonarqube sonarweaver_restore
          docker compose --env-file .env -f compose.yaml -f compose.local.yaml \
            exec -T db pg_dump --format=custom -U sonarqube -d sonarqube |
            docker compose --env-file .env -f compose.yaml -f compose.local.yaml \
              exec -T db pg_restore --exit-on-error --no-owner -U sonarqube -d sonarweaver_restore
          docker compose --env-file .env -f compose.yaml -f compose.local.yaml \
            exec -T db psql -tAc "SELECT EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema = 'public');" \
            -U sonarqube -d sonarweaver_restore | grep -qx t

      - name: Collect Compose diagnostics
        if: always()
        working-directory: deployments/docker
        shell: bash
        run: |
          docker compose --env-file .env -f compose.yaml -f compose.local.yaml ps
          docker compose --env-file .env -f compose.yaml -f compose.local.yaml logs --no-color

      - name: Stop the evaluation stack without deleting volumes
        if: always()
        working-directory: deployments/docker
        shell: bash
        run: docker compose --env-file .env -f compose.yaml -f compose.local.yaml down --remove-orphans

  helm:
    name: Helm (${{ matrix.distribution }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        distribution:
          - k3s
          - rke2
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Add official SonarSource chart repository
        run: |
          helm repo add sonarqube https://SonarSource.github.io/helm-chart-sonarqube
          helm repo update

      - name: Render official chart with SonarWeaver values
        shell: bash
        run: |
          chart_version=$(sed -n 's/^SONARQUBE_HELM_CHART_VERSION="\([0-9][0-9.]*\)"$/\1/p' config/versions.env)
          kubernetes_minor=$(sed -n 's/^KUBERNETES_MAX_MINOR="\([0-9][0-9]*\)"$/\1/p' config/versions.env)
          if [[ ! ${chart_version} =~ ^[0-9]+(\.[0-9]+)+$ ]]; then
            echo 'Invalid or missing SONARQUBE_HELM_CHART_VERSION in config/versions.env.' >&2
            exit 1
          fi
          if [[ ! ${kubernetes_minor} =~ ^[0-9]+$ ]]; then
            echo 'Invalid or missing KUBERNETES_MAX_MINOR in config/versions.env.' >&2
            exit 1
          fi

          common_values='deployments/kubernetes/common/values.yaml'
          distribution_values="deployments/kubernetes/${{ matrix.distribution }}/values.yaml"
          for file in "${common_values}" "${distribution_values}"; do
            if [[ ! -f "${file}" ]]; then
              echo "Required values file not found: ${file}" >&2
              exit 1
            fi
          done

          rendered_chart=$(mktemp)
          helm template sonarweaver sonarqube/sonarqube \
            --version "${chart_version}" \
            --kube-version "1.${kubernetes_minor}.0" \
            --namespace sonarqube \
            --values "${common_values}" \
            --values "${distribution_values}" \
            >"${rendered_chart}"

          grep -q 'app.kubernetes.io/instance: sonarweaver' "${rendered_chart}"
          grep -q 'app.kubernetes.io/name: sonarqube' "${rendered_chart}"

  kubernetes-integration:
    name: Kubernetes integration
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Create a supported disposable Kubernetes cluster
        shell: bash
        run: |
          command -v kind
          helm version --short
          kind create cluster --name sonarweaver --image kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f --wait 3m

      - name: Validate the rendered production NetworkPolicy with the Kubernetes API
        shell: bash
        run: |
          kubectl create namespace sonarweaver-policy-test
          sed \
            -e 's|@RELEASE@|sonarqube|g' \
            -e 's|@DATABASE_EGRESS_CIDR@|10.42.0.10/32|g' \
            -e 's|port: 0 # @DATABASE_PORT@|port: 5432|g' \
            deployments/kubernetes/common/network-policy.yaml.in |
            kubectl -n sonarweaver-policy-test apply --dry-run=server -f -

      - name: Install the evaluation release through SonarWeaver
        shell: bash
        run: ./bin/sonarweaver install k3s --profile evaluation

      - name: Wait for SonarQube API health
        shell: bash
        run: |
          kubectl -n sonarqube rollout status deployment/sonarqube-sonarqube --timeout=15m
          kubectl -n sonarqube port-forward service/sonarqube-sonarqube 9000:9000 >/tmp/sonarweaver-port-forward.log 2>&1 &
          port_forward_pid=$!
          trap 'kill "${port_forward_pid}" 2>/dev/null || true' EXIT
          for attempt in {1..90}; do
            if curl --fail --silent --show-error http://127.0.0.1:9000/api/system/status | grep -q '"status":"UP"'; then
              exit 0
            fi
            sleep 5
          done
          echo 'SonarQube did not report UP within 450 seconds after rollout.' >&2
          exit 1

      - name: Collect Kubernetes diagnostics
        if: always()
        shell: bash
        run: |
          kubectl -n sonarqube get pods,pvc,service,events --sort-by=.metadata.creationTimestamp || true
          kubectl -n sonarqube logs deployment/sonarqube-sonarqube --all-containers=true --tail=300 || true
          cat /tmp/sonarweaver-port-forward.log 2>/dev/null || true

      - name: Delete the disposable cluster
        if: always()
        run: kind delete cluster --name sonarweaver

  workflow-security:
    name: Workflow security
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Install workflow security scanner
        run: |
          python3 -m venv .zizmor-venv
          .zizmor-venv/bin/pip install -r requirements-ci.txt

      - name: Scan GitHub Actions workflows
        run: .zizmor-venv/bin/zizmor .github/workflows

  secret-scanning:
    name: Secret scanning
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository history
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan repository history and working tree
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image-vulnerability-scanning:
    name: Image vulnerability scanning (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sonarqube
            image: sonarqube@sha256:160bd2f6a3485bd09b655ef22dd63c02bd1fa7ba82aa5d9973fd010b8bcca0b3
          - name: postgresql
            image: postgres@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a
    steps:
      - name: Scan immutable image for fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

  image-sbom:
    name: Image SBOM (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sonarqube
            image: sonarqube@sha256:160bd2f6a3485bd09b655ef22dd63c02bd1fa7ba82aa5d9973fd010b8bcca0b3
          - name: postgresql
            image: postgres@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a
    steps:
      - name: Generate SPDX software bill of materials
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ matrix.image }}
          format: spdx-json
          artifact-name: sonarweaver-${{ matrix.name }}-sbom
